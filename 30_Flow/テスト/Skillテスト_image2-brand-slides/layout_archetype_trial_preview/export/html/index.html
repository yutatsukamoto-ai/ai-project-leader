<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>layout_archetype_trial_preview</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #111214;
      --panel: rgba(17, 18, 20, 0.82);
      --text: #f7f7f5;
      --muted: #b8bbb8;
      --accent: #d6e4ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow: hidden;
    }
    main {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 44px 56px;
    }
    .stage {
      width: min(100%, calc(100vh * 16 / 9 - 96px));
      aspect-ratio: 16 / 9;
      position: relative;
      background: #fff;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }
    .stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }
    .nav {
      position: fixed;
      inset: auto 0 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: linear-gradient(to top, var(--panel), transparent);
      pointer-events: none;
    }
    .nav button, .thumb-toggle {
      pointer-events: auto;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      min-width: 44px;
      height: 36px;
      padding: 0 12px;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
    }
    .meta {
      min-width: 180px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0;
    }
    .thumbs {
      position: fixed;
      top: 0;
      right: 0;
      width: min(320px, 88vw);
      height: 100vh;
      overflow: auto;
      padding: 16px;
      background: var(--panel);
      transform: translateX(100%);
      transition: transform 180ms ease;
    }
    .thumbs.open { transform: translateX(0); }
    .thumb {
      width: 100%;
      margin: 0 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border-radius: 6px;
      padding: 8px;
      text-align: left;
      cursor: pointer;
    }
    .thumb.active { outline: 2px solid var(--accent); }
    .thumb img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: #fff;
      border-radius: 3px;
      margin-bottom: 6px;
    }
    .thumb span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .print-root { display: none; }
    @media (max-width: 720px) {
      main { padding: 26px 12px 70px; }
      .stage { width: 100%; }
      .meta { min-width: 120px; }
    }
    @media print {
      @page { size: 16in 9in; margin: 0; }
      body { background: #fff; overflow: visible; }
      main, .stage { display: block; width: 100vw; height: 100vh; padding: 0; box-shadow: none; }
      main { display: none; }
      .nav, .thumbs { display: none !important; }
      .print-root { display: block; }
      .print-slide { page-break-after: always; width: 100vw; height: 100vh; }
      .print-slide img { width: 100%; height: 100%; object-fit: contain; display: block; }
    }
  </style>
</head>
<body>
  <main>
    <div class="stage"><img id="slide" src="slides/01-title.png" alt="AIプロジェクト推進の型"></div>
  </main>
  <div class="nav">
    <button id="prev" type="button" aria-label="Previous slide">Prev</button>
    <div class="meta"><span id="counter"></span></div>
    <button id="next" type="button" aria-label="Next slide">Next</button>
    <button class="thumb-toggle" id="toggle" type="button" aria-label="Toggle thumbnails">List</button>
  </div>
  <aside class="thumbs" id="thumbs" aria-label="Slide list"></aside>
  <script>
    const slides = [{"file": "slides/01-title.png", "title": "AIプロジェクト推進の型"}, {"file": "slides/02-normal.png", "title": "PoC開始前の課題"}, {"file": "slides/03-normal.png", "title": "推進プロセス"}, {"file": "slides/04-normal.png", "title": "成功条件"}, {"file": "slides/05-normal.png", "title": "再利用資産"}];
    let index = 0;
    const img = document.getElementById('slide');
    const counter = document.getElementById('counter');
    const thumbs = document.getElementById('thumbs');

    function clamp(n) {
      return Math.max(0, Math.min(slides.length - 1, n));
    }

    function show(n) {
      index = clamp(n);
      const slide = slides[index];
      img.src = slide.file;
      img.alt = slide.title || `Slide ${index + 1}`;
      counter.textContent = `${index + 1} / ${slides.length}`;
      [...thumbs.querySelectorAll('.thumb')].forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });
    }

    function buildThumbs() {
      thumbs.innerHTML = '';
      slides.forEach((slide, i) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'thumb';
        const thumbImg = document.createElement('img');
        thumbImg.src = slide.file;
        thumbImg.alt = '';
        const label = document.createElement('span');
        label.textContent = `${i + 1}. ${slide.title || ''}`;
        button.appendChild(thumbImg);
        button.appendChild(label);
        button.addEventListener('click', () => { show(i); thumbs.classList.remove('open'); });
        thumbs.appendChild(button);
      });
    }

    document.getElementById('prev').addEventListener('click', () => show(index - 1));
    document.getElementById('next').addEventListener('click', () => show(index + 1));
    document.getElementById('toggle').addEventListener('click', () => thumbs.classList.toggle('open'));
    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') show(index - 1);
      if (event.key === 'ArrowRight' || event.key === ' ') show(index + 1);
      if (event.key === 'Home') show(0);
      if (event.key === 'End') show(slides.length - 1);
      if (event.key === 'Escape') thumbs.classList.remove('open');
    });
    document.querySelector('.stage').addEventListener('click', () => show(index + 1));
    buildThumbs();
    show(0);
  </script>
  <div class="print-root">
    <section class="print-slide"><img src="slides/01-title.png" alt="AIプロジェクト推進の型"></section><section class="print-slide"><img src="slides/02-normal.png" alt="PoC開始前の課題"></section><section class="print-slide"><img src="slides/03-normal.png" alt="推進プロセス"></section><section class="print-slide"><img src="slides/04-normal.png" alt="成功条件"></section><section class="print-slide"><img src="slides/05-normal.png" alt="再利用資産"></section>
  </div>
</body>
</html>
