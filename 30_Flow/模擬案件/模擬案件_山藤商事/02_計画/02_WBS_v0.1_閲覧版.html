<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>WBS（閲覧版）</title>
<style>
  :root{ --blue:#3b82f6; --purple:#7c3aed; --line:#e5e7eb; --head:#eef2ff; --red:#ef4444; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",system-ui,sans-serif; color:#1f2937; background:#fff; }
  .wrap{ padding:16px 18px; }
  h1{ font-size:18px; margin:0 0 2px; }
  .sub{ color:#6b7280; font-size:12px; margin-bottom:12px; }
  .board{ display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  .info{ flex:0 0 auto; }
  .gwrap{ overflow-x:auto; }
  .row{ height:26px; display:flex; align-items:center; border-bottom:1px solid var(--line); font-size:12.5px; }
  .hrow{ height:36px; background:var(--head); font-weight:600; font-size:11px; }
  .hrow .c{ white-space:normal; line-height:1.18; text-align:center; }
  .grp{ display:flex; flex-direction:column; height:36px; }
  .grp-top{ height:16px; line-height:16px; text-align:center; font-size:10px; color:#6b7280; border-bottom:1px solid var(--line); border-right:1px solid #f1f5f9; }
  .grp-bot{ display:flex; height:20px; }
  .grp-bot .c{ line-height:20px; height:20px; }
  .todaylabel{ position:absolute; top:1px; font-size:9px; color:var(--red); font-weight:700; transform:translateX(4px); white-space:nowrap; z-index:8; }
  .c{ padding:0 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border-right:1px solid #f1f5f9; }
  .c.no{ width:42px; text-align:center; }
  .c.nm{ width:190px; }
  .c.as{ width:74px; }
  .c.k{ width:54px; text-align:right; }
  .c.d{ width:58px; text-align:right; color:#374151; }
  .lv0{ background:#f8fafc; font-weight:700; }
  .done{ color:#9ca3af; text-decoration:line-through; }
  .gbody{ position:relative; }
  .ghead{ position:relative; height:36px; background:var(--head); border-bottom:1px solid var(--line); }
  .tick{ position:absolute; top:0; width:18px; height:100%; font-size:9px; text-align:center; color:#6b7280; padding-top:4px; line-height:1.25; border-right:1px solid #eef2ff; }
  .tick.sun{ color:var(--red); } .tick.sat{ color:#2563eb; }
  .wknd{ position:absolute; top:0; bottom:0; width:18px; background:#f8fafc; }
  .grow{ position:absolute; left:0; height:26px; border-bottom:1px solid #f3f4f6; }
  .planbox{ position:absolute; height:14px; border:1.5px solid #9ca3af; border-radius:3px; background:transparent; }
  .planbox.late{ border-color:#ef4444; background:rgba(239,68,68,.10); }
  .actbar{ position:absolute; height:14px; border-radius:3px; }
  .today{ position:absolute; top:0; bottom:0; width:2px; background:var(--red); z-index:6; }
  .ms{ position:absolute; top:0; bottom:0; border-left:2px dashed var(--red); z-index:5; }
  .mslabel{ position:absolute; top:1px; font-size:9px; color:var(--red); transform:translateX(4px); white-space:nowrap; }
  svg.inazuma{ position:absolute; left:0; top:0; z-index:7; pointer-events:none; }
  .legend{ font-size:11px; color:#6b7280; margin-top:10px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .sw{ display:inline-block; width:16px; height:9px; vertical-align:middle; margin-right:4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title"></h1>
  <div class="sub" id="sub"></div>
  <div class="board">
    <div class="info" id="info"></div>
    <div class="gwrap"><div id="ghead" class="ghead"></div><div id="gbody" class="gbody"></div></div>
  </div>
  <div class="legend">
    <span><span class="sw" style="border:1.5px solid #9ca3af;border-radius:3px"></span>予定（枠）</span>
    <span><span class="sw" style="background:#3b82f6;border-radius:3px"></span>実績（塗り）</span>
    <span><span class="sw" style="background:#7c3aed;opacity:.85;border-radius:3px"></span>段階の実績</span>
    <span><span class="sw" style="background:#ef4444;width:3px;height:13px"></span>本日線</span>
    <span><span class="sw" style="border-top:2px solid #ef4444;height:0;width:18px"></span>イナズマ線（左へ折れ＝遅れ）</span>
    <span><span class="sw" style="border:1.5px solid #ef4444;background:rgba(239,68,68,.10);border-radius:3px"></span>着手遅れ（未着手で予定開始を超過）</span>
  </div>
</div>
<script>
// __WBS_DATA_START__  ここを案件の wbs.json で丸ごと置き換える
const DATA = {
  "projects": [
    {
      "name": "山藤商事 生成AI/DX推進",
      "milestones": [
        { "date": "2026-08-14", "label": "段階1ゲート(試行開始?)", "color": "#ef4444" }
      ],
      "tasks": [
        {
          "id": "1",
          "name": "段階1 見える化",
          "children": [
            { "id": "1.1", "name": "現場ヒアリング", "qty": 1, "hours": 24, "assignee": "当方/営業責任者",
              "plan": { "start": "2026-07-06", "end": "2026-07-17" },
              "actual": { "start": null, "end": null }, "note": "→As-Isメモ(仮日付)" },
            { "id": "1.2", "name": "業務フロー可視化(As-Is)", "qty": 1, "hours": 24, "assignee": "当方",
              "plan": { "start": "2026-07-13", "end": "2026-07-27" },
              "actual": { "start": null, "end": null }, "note": "→As-Isメモ(仮日付)" },
            { "id": "1.3", "name": "失敗要因調査", "qty": 1, "hours": 16, "assignee": "当方/佐藤",
              "plan": { "start": "2026-07-13", "end": "2026-07-24" },
              "actual": { "start": null, "end": null }, "note": "→要因レポート / R-01対応(仮日付)" },
            { "id": "1.4", "name": "対象業務の選定", "qty": 1, "hours": 8, "assignee": "現場",
              "plan": { "start": "2026-07-28", "end": "2026-08-07" },
              "actual": { "start": null, "end": null }, "note": "→PoC対象決定 / ★律速(クリティカルパス)" }
          ]
        },
        {
          "id": "2",
          "name": "段階2 小さく試す(骨格)",
          "children": [
            { "id": "2.1", "name": "見積・報告書PoC", "qty": 1, "hours": 0, "assignee": "",
              "plan": { "start": null, "end": null },
              "actual": { "start": null, "end": null }, "note": "🟡ゲート後に詳細化 / 関所:入力情報の線引き(R-02漏洩)を試行前に確定" },
            { "id": "2.2", "name": "経営数値の要件整理(並行)", "qty": 1, "hours": 0, "assignee": "",
              "plan": { "start": null, "end": null },
              "actual": { "start": null, "end": null }, "note": "🟡要件メモ・データ所在" }
          ]
        },
        {
          "id": "3",
          "name": "段階3 評価と次計画(骨格)",
          "children": [
            { "id": "3.1", "name": "効果測定", "qty": 1, "hours": 0, "assignee": "",
              "plan": { "start": null, "end": null },
              "actual": { "start": null, "end": null }, "note": "🟡前後比較＋現場の声" },
            { "id": "3.2", "name": "次期計画/見直し案 提示", "qty": 1, "hours": 0, "assignee": "",
              "plan": { "start": null, "end": null },
              "actual": { "start": null, "end": null }, "note": "🟡3軸評価(事業価値/運用適合/リスク)" }
          ]
        }
      ]
    }
  ]
};
// __WBS_DATA_END__
const _n=new Date(); const TODAY=new Date(_n.getFullYear(),_n.getMonth(),_n.getDate());
const DAY=18, RH=26, MS=86400000;
const pd=s=>{ if(!s) return null; const[a,b,c]=s.split('-').map(Number); return new Date(a,b-1,c); };
const fmt=d=> d? (d.getMonth()+1)+'/'+d.getDate():'—';
const proj=DATA.projects[0];

// flatten + rollup
const flat=[];
function walk(node,lv){
  node._as=pd(node.actual&&node.actual.start); node._ae=pd(node.actual&&node.actual.end);
  if(node.children){
    let s=null,e=null,k=0,as=null,ae=null;
    node.children.forEach(c=>{ walk(c,lv+1);
      if(c._s&&(!s||c._s<s))s=c._s; if(c._e&&(!e||c._e>e))e=c._e; k+=c._k;
      if(c._as&&(!as||c._as<as))as=c._as; if(c._ae&&(!ae||c._ae>ae))ae=c._ae; });
    node._s=s;node._e=e;node._k=k; node._as=as; node._ae=node.children.every(c=>c._ae)?ae:null;
  }else{ node._s=pd(node.plan&&node.plan.start); node._e=pd(node.plan&&node.plan.end); node._k=(node.qty||0)*(node.hours||0)/8; }
}
// pre-order flatten while computing
function flatten(node,lv){ const i=flat.length; flat.push(node); node._lv=lv; node._row=i;
  if(node.children) node.children.forEach(c=>flatten(c,lv+1)); }
proj.tasks.forEach(t=>walk(t,0));
proj.tasks.forEach(t=>flatten(t,0));

// date range
let all=[TODAY]; (proj.milestones||[]).forEach(m=>{const d=pd(m.date); if(d)all.push(d);});
flat.forEach(n=>{ [n._s,n._e,n._as,n._ae].forEach(d=>{ if(d)all.push(d); }); });
let min=new Date(Math.min(...all)), max=new Date(Math.max(...all));
min=new Date(min-2*MS); max=new Date(max.getTime()+2*MS);
const nd=Math.round((max-min)/MS)+1, W=nd*DAY, BH=flat.length*RH;
const x=d=> Math.round((d-min)/MS)*DAY;
const xend=d=> x(d)+DAY; // バー終端は当日いっぱい

let totK=0; flat.forEach(n=>{ if(!n.children) totK+=n._k; }); totK=Math.round(totK*10)/10;
document.getElementById('title').textContent=proj.name+' ― WBS';
const ts=TODAY.getFullYear()+'-'+String(TODAY.getMonth()+1).padStart(2,'0')+'-'+String(TODAY.getDate()).padStart(2,'0');
document.getElementById('sub').textContent='総工数 '+totK+'人日 ／ 本日 '+ts+' ／ 赤の折れ線＝イナズマ線（本日線から左へ折れているほど遅れ）';

// info panel
let ih='<div class="row hrow"><div class="c no">No.</div><div class="c nm">作業項目</div><div class="c as">担当</div><div class="c k">工数</div><div class="grp"><div class="grp-top">予定</div><div class="grp-bot"><div class="c d">開始</div><div class="c d">終了</div></div></div><div class="grp"><div class="grp-top">実績</div><div class="grp-bot"><div class="c d">開始</div><div class="c d">終了</div></div></div></div>';
flat.forEach(n=>{ const done=!!n._ae && !n.children; const k=n._k?(Math.round(n._k*10)/10):'';
  ih+='<div class="row '+(n._lv===0?'lv0':'')+'">'+
    '<div class="c no">'+n.id+'</div>'+
    '<div class="c nm '+(done?'done':'')+'" style="padding-left:'+(8+n._lv*14)+'px" title="'+(n.note||'')+'">'+(n.children?'▼ ':'')+(done?'✓ ':'')+n.name+'</div>'+
    '<div class="c as">'+(n.assignee||'')+'</div>'+
    '<div class="c k">'+k+'</div>'+
    '<div class="c d">'+fmt(n._s)+'</div><div class="c d">'+fmt(n._e)+'</div>'+
    '<div class="c d">'+fmt(n._as)+'</div><div class="c d">'+(n._ae?fmt(n._ae):(n._as?'進行中':'—'))+'</div>'+
  '</div>'; });
document.getElementById('info').innerHTML=ih;

// gantt header
let gh='';
for(let i=0;i<nd;i++){ const d=new Date(min.getTime()+i*MS); const wd=d.getDay(); const cls=wd===0?'sun':(wd===6?'sat':'');
  gh+='<div class="tick '+cls+'" style="left:'+(i*DAY)+'px">'+d.getDate()+'<br>'+['日','月','火','水','木','金','土'][wd]+'</div>'; }
const ghead=document.getElementById('ghead'); ghead.style.width=W+'px'; ghead.innerHTML=gh;

// gantt body
const gb=document.getElementById('gbody'); gb.style.width=W+'px'; gb.style.height=BH+'px';
let bh='';
for(let i=0;i<nd;i++){ const d=new Date(min.getTime()+i*MS); if(d.getDay()===0||d.getDay()===6) bh+='<div class="wknd" style="left:'+(i*DAY)+'px"></div>'; }
flat.forEach(n=>{ const top=n._row*RH;
  if(n._s&&n._e){ const L=x(n._s), Wd=Math.max(DAY,xend(n._e)-x(n._s));
    const late=(!n.children && !n._as && TODAY>n._s && !n._ae);
    bh+='<div class="planbox'+(late?' late':'')+'" style="left:'+L+'px;width:'+Wd+'px;top:'+(top+6)+'px"></div>'; }
  // actual
  let as=n._as, ae=n._ae|| (n._as? TODAY:null);
  if(as&&ae){ const L=x(as), Wd=Math.max(DAY,xend(ae)-x(as)); const col=n.children?'#7c3aed':'#3b82f6'; const op=n.children?'0.85':'1';
    bh+='<div class="actbar" style="left:'+L+'px;width:'+Wd+'px;top:'+(top+6)+'px;background:'+col+';opacity:'+op+'"></div>'; }
});
bh+='<div class="today" style="left:'+x(TODAY)+'px"></div>';
bh+='<div class="todaylabel" style="left:'+x(TODAY)+'px">本日 '+(TODAY.getMonth()+1)+'/'+TODAY.getDate()+'</div>';
(proj.milestones||[]).forEach(m=>{const d=pd(m.date); if(d){ bh+='<div class="ms" style="left:'+x(d)+'px"></div><div class="mslabel" style="left:'+x(d)+'px">'+(m.label||'')+'</div>'; }});
gb.innerHTML=bh;

// イナズマ線（leafごとに点。左へ突出＝遅延）
function inazumaX(n){
  const tx=x(TODAY)+1;
  if(n._ae) return tx;                              // 完了→本日線
  if(n._as){ return (TODAY>n._e)? x(n._e)+DAY/2 : tx; } // 進行中: 終了遅延なら予定終了、否なら本日
  if(n._s && TODAY>n._s) return x(n._s)+DAY/2;      // 着手遅れ→予定開始
  return tx;                                        // 未到来→本日線
}
const leaves=flat.filter(n=>!n.children);
let pts=leaves.map(n=> (inazumaX(n))+','+(n._row*RH+RH/2));
let svg='<svg class="inazuma" width="'+W+'" height="'+BH+'">'+
  '<polyline points="'+pts.join(' ')+'" fill="none" stroke="#ef4444" stroke-width="1.6"/>';
leaves.forEach(n=>{ svg+='<circle cx="'+inazumaX(n)+'" cy="'+(n._row*RH+RH/2)+'" r="2.4" fill="#ef4444"/>'; });
svg+='</svg>';
gb.insertAdjacentHTML('beforeend',svg);
</script>
</body>
</html>
