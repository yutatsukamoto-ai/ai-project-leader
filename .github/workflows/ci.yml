name: CI — 構造健全性 + 回帰eval

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 構造健全性チェック (build.sh --verify)
        run: bash _tools/build.sh --verify

      - name: 回帰eval — 機械チェック層 (eval.sh)
        run: bash _tools/eval.sh

      - name: Hook scripts smoke test
        run: bash _tools/test-hooks.sh

      - name: Claude Code distribution smoke test
        run: |
          bash _tools/build.sh --sync-cc
          bash _tools/package-dist.sh --target claude-code
          bash _tools/test-dist-cc.sh

      - name: Codex distribution smoke test
        run: |
          bash _tools/package-dist.sh --target codex
          bash _tools/test-dist-codex.sh
